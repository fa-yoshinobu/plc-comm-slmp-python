site_dir: docs
docs_dir: docsrc
site_name: SLMP Connect Python (slmp) API Reference
site_url: https://fa-yoshinobu.github.io/plc-comm-slmp-python/
repo_url: https://github.com/fa-yoshinobu/plc-comm-slmp-python
repo_name: GitHub
theme:
  name: material
  palette:
    scheme: slate
    primary: blue
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true

validation:
  nav:
    omitted_files: ignore

exclude_docs: |
  internal_docs/**
  maintainer/**
  validation/**

nav:
  - Overview: index.md
  - User Docs:
      - Getting Started: user/GETTING_STARTED.md
      - Supported PLC Registers: user/SUPPORTED_REGISTERS.md
      - Latest Communication Verification: user/LATEST_COMMUNICATION_VERIFICATION.md
      - User Guide: user/USER_GUIDE.md
      - Samples: user/SAMPLES.md
      - Error Codes: user/ERROR_CODES.md
      - Device Table: user/BIT_DEVICE_ACCESS_TABLE.md
  - API Reference:
      - Client: api/client.md
      - Core: api/core.md
      - Constants: api/constants.md
  - Change Log: CHANGELOG.md
