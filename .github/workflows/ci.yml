name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Checkout shared verification vectors
        uses: actions/checkout@v6
        with:
          repository: fa-yoshinobu/plc-comm-slmp-cross-verify
          ref: main
          path: plc-comm-slmp-cross-verify
          sparse-checkout: |
            specs/shared
          token: ${{ secrets.CROSS_VERIFY_REPO_TOKEN != '' && secrets.CROSS_VERIFY_REPO_TOKEN || github.token }}

      - name: Expose shared vectors at sibling path
        run: ln -sfn "$GITHUB_WORKSPACE/plc-comm-slmp-cross-verify" "$GITHUB_WORKSPACE/../plc-comm-slmp-cross-verify"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy slmp scripts

      - name: Build package
        run: python -m build
